name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

  smoke-e2e:
    name: Smoke E2E
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate E2E secrets
        id: preflight
        shell: bash
        run: |
          missing=0
          for env_name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!env_name}" ]; then
              echo "::warning::Missing required secret: ${env_name}. Smoke E2E will be skipped."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browser
        if: steps.preflight.outputs.run_smoke == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        if: steps.preflight.outputs.run_smoke == 'true'
        run: npm run e2e:smoke
